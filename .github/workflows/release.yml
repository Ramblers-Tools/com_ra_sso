name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package manifest
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' Joomla-OAuth-Client-OIDC/miniorange-joomla-oauth-client-free-plugin/pkg_oauthclient.xml | head -1)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release for v$VERSION"

      - name: Build package zip
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          bash Joomla-OAuth-Client-OIDC/build-package.sh "$VERSION" "dist/ra-sso-login-installer.zip"

      - name: Compute sha256
        id: sha
        run: |
          SHA=$(sha256sum dist/ra-sso-login-installer.zip | awk '{print $1}')
          echo "SHA=$SHA" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          prerelease: false
          body: |
            Full release of RA SSO Login v${{ steps.version.outputs.VERSION }}.

            Install or update via Joomla Extensions → Install, or use the Joomla auto-update system if you have a previous version installed.
          files: dist/ra-sso-login-installer.zip

      - name: Update update manifest
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA=${{ steps.sha.outputs.SHA }}
          DOWNLOAD_URL="https://github.com/Ramblers-Tools/com_ra_sso/releases/download/v${VERSION}/ra-sso-login-installer.zip"
          INFO_URL="https://github.com/Ramblers-Tools/com_ra_sso/releases/tag/v${VERSION}"

          cat > Joomla-OAuth-Client-OIDC/updates/ra_sso_login.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <updates>
              <update>
                  <name>pkg_ra_sso_login</name>
                  <description>RA SSO Login for Joomla.</description>
                  <element>pkg_ra_sso_login</element>
                  <type>package</type>
                  <version>${VERSION}</version>
                  <client>site</client>
                  <infourl title="Release notes">${INFO_URL}</infourl>
                  <downloads>
                      <downloadurl type="full" format="zip">${DOWNLOAD_URL}</downloadurl>
                  </downloads>
                  <sha256>${SHA}</sha256>
                  <targetplatform name="joomla" version="5.*"/>
              </update>
          </updates>
          EOF

      - name: Open PR to update manifest
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-manifest-v${{ steps.version.outputs.VERSION }}
          base: main
          commit-message: "Update manifest for v${{ steps.version.outputs.VERSION }}"
          title: "Update update manifest for v${{ steps.version.outputs.VERSION }}"
          body: |
            Automated update of `Joomla-OAuth-Client-OIDC/updates/ra_sso_login.xml` following the v${{ steps.version.outputs.VERSION }} release.

            Sets the correct sha256 so Joomla auto-update can verify the package.
          delete-branch: true
