LIB_RA_SSO_USER_AUTO_CREATION_NOT_AVAILABLE_REASON_CAUSE_SOLUTION="<p><strong>เหตุผล:</strong>แผนไม่สามารถสร้างผู้ใช้ใหม่ในระหว่างการพยายามเข้าสู่ระบบ</p><p><strong>สาเหตุ:</strong>ปลั๊กอิน OAuth ปัจจุบันของคุณไม่รองรับการสร้างผู้ใช้อัตโนมัติ คุณสมบัตินี้มีเฉพาะในไฟล์<strong>มาตรฐาน</strong>-<strong>พรีเมี่ยม</strong>, หรือ<strong>องค์กร</strong>แผน.</p><p><strong>สารละลาย:</strong>อัพเกรดเวอร์ชันปลั๊กอินของคุณเพื่อเปิดใช้งานการจัดเตรียมอัตโนมัติของผู้ใช้และการเข้าถึงคุณสมบัติขั้นสูง</p>"
